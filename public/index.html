<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>De QuaterniXXI a Notion</title>
  <link rel="icon" href="/tareaqxxi/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/tareaqxxi/css/style.css">
</head>
<body class="login-body">
  <div class="login-container">
    <h1><img class="app-icon app-icon-login" src="/tareaqxxi/icon.svg" alt="">De QuaterniXXI a Notion</h1>
    <p class="subtitle">Crear tareas en Notion desde pantallazos QXXI</p>
    <form action="/tareaqxxi/login" method="POST" class="login-form">
      <input type="text" name="username" placeholder="Usuario" required autofocus>
      <input type="password" name="password" placeholder="Contraseña" required>
      <button type="submit">Entrar</button>
    </form>
    <p class="error" id="error-msg"></p>
  </div>
  <script>
    if (window.location.search.includes('error=1')) {
      document.getElementById('error-msg').textContent = 'Usuario o contraseña incorrectos';
    }
  </script>
</body>
</html>
